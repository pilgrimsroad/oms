services:

  redis:
    image: redis:7-alpine
    container_name: oms-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  oms-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oms-api
    ports:
      - "${OMS_PORT}:${OMS_PORT}"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=host.docker.internal
      - OMS_BASE_URL=${OMS_BASE_URL}:${OMS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- ${OMS_BASE_URL}:${OMS_PORT}/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
